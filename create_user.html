{% extends 'base.html' %}
{% block title %}Create User{% endblock %}
{% block page_title %}Create New User{% endblock %}
{% block content %}
<div style="max-width:540px;margin:0 auto">
  <div class="card">
    <div class="card-header">
      <span class="card-title">New User Account</span>
      <a href="{{ url_for('admin_users') }}" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username <span class="req">*</span></label>
        <input type="text" name="username" required placeholder="e.g. s006 or prof_kumar">
        <div class="text-muted mt-1">Username is permanent and cannot be changed after creation (REQ-7.7).</div>
      </div>
      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" name="full_name" required placeholder="e.g. Arjun Kumar">
      </div>
      <div class="form-group">
        <label>College Email <span class="req">*</span></label>
        <input type="email" name="email" required placeholder="e.g. arjun@attendify.edu">
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Role <span class="req">*</span></label>
          <select name="role" required>
            <option value="">— Select Role —</option>
            <option value="ADMIN">Administrator</option>
            <option value="FACULTY">Faculty</option>
            <option value="STUDENT">Student</option>
          </select>
        </div>
        <div class="form-group">
          <label>Batch <span style="color:var(--text3)">(Students only)</span></label>
          <input type="text" name="batch" placeholder="e.g. CSE-A 2024">
        </div>
      </div>
      <div class="form-group">
        <label>Initial Password <span class="req">*</span></label>
        <input type="password" name="password" required placeholder="Minimum 8 characters">
      </div>
      <div class="flex gap-2 justify-between mt-3">
        <a href="{{ url_for('admin_users') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Create User →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
