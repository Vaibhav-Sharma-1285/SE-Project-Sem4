{% extends 'base.html' %}
{% block title %}Edit Course{% endblock %}
{% block page_title %}Edit Course{% endblock %}
{% block content %}
<div style="max-width:540px;margin:0 auto">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Edit — {{ course.course_code }}</span>
      <a href="{{ url_for('admin_courses') }}" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Course Code</label>
        <input type="text" value="{{ course.course_code }}" disabled style="opacity:.5;cursor:not-allowed">
        <div class="text-muted mt-1">Course code cannot be changed.</div>
      </div>
      <div class="form-group">
        <label>Course Name <span class="req">*</span></label>
        <input type="text" name="course_name" value="{{ course.course_name }}" required>
      </div>
      <div class="form-group">
        <label>Credit Hours <span class="req">*</span></label>
        <input type="number" name="credits" value="{{ course.credits }}" min="1" max="6" required>
      </div>
      <div class="flex gap-2 justify-between mt-3">
        <a href="{{ url_for('admin_courses') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
