{% extends 'base.html' %}
{% block title %}Edit User{% endblock %}
{% block page_title %}Edit User{% endblock %}
{% block content %}
<div style="max-width:540px;margin:0 auto">
  <div class="card">
    <div class="card-header">
      <span class="card-title">Edit Account — {{ user.username }}</span>
      <a href="{{ url_for('admin_users') }}" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" value="{{ user.username }}" disabled>
        <div class="text-muted mt-1">Username cannot be changed (REQ-7.7).</div>
      </div>
      <div class="form-group">
        <label>Full Name <span class="req">*</span></label>
        <input type="text" name="full_name" value="{{ user.full_name }}" required>
      </div>
      <div class="form-group">
        <label>College Email <span class="req">*</span></label>
        <input type="email" name="email" value="{{ user.email }}" required>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Role <span class="req">*</span></label>
          <select name="role" required>
            <option value="ADMIN"   {% if user.role=='ADMIN'   %}selected{% endif %}>Administrator</option>
            <option value="FACULTY" {% if user.role=='FACULTY' %}selected{% endif %}>Faculty</option>
            <option value="STUDENT" {% if user.role=='STUDENT' %}selected{% endif %}>Student</option>
          </select>
        </div>
        <div class="form-group">
          <label>Batch</label>
          <input type="text" name="batch" value="{{ user.batch or '' }}" placeholder="e.g. CSE-A 2024">
        </div>
      </div>
      <div class="flex gap-2 justify-between mt-3">
        <a href="{{ url_for('admin_users') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
