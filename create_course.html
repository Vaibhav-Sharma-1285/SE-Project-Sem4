{% extends 'base.html' %}
{% block title %}Create Course{% endblock %}
{% block page_title %}Create New Course{% endblock %}
{% block content %}
<div style="max-width:540px;margin:0 auto">
  <div class="card">
    <div class="card-header">
      <span class="card-title">New Course</span>
      <a href="{{ url_for('admin_courses') }}" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Course Code <span class="req">*</span></label>
        <input type="text" name="course_code" required placeholder="e.g. CSE405" style="text-transform:uppercase">
        <div class="text-muted mt-1">Must be unique. Will be auto-uppercased.</div>
      </div>
      <div class="form-group">
        <label>Course Name <span class="req">*</span></label>
        <input type="text" name="course_name" required placeholder="e.g. Artificial Intelligence">
      </div>
      <div class="form-group">
        <label>Credit Hours <span class="req">*</span></label>
        <input type="number" name="credits" min="1" max="6" required placeholder="e.g. 4">
      </div>
      <div class="flex gap-2 justify-between mt-3">
        <a href="{{ url_for('admin_courses') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">Create Course →</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
